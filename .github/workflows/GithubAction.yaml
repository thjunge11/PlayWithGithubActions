name: my CI/CD Workflow

env:
  GLOBAL_VAR: "global scope"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build application
        run: echo "Building..."

  test:
    runs-on: ubuntu-latest
    needs: build
    env:
      JOB_VAR: "job scope"
    steps:
      - environment:
          STEP_VAR: "step scope"
      - name: Run tests
        run: echo "Testing with variables in following scopes: $GLOBAL_VAR, $JOB_VAR, and $STEP_VAR"

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy application
        run: echo "Deploying..."