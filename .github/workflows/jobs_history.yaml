name: jobs history

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: create file testfile.lck
        run: touch testfile.lck
      - name: test if file testfile.lck exists
        run: test -f testfile.lck

  check:
    runs-on: ubuntu-latest
    needs: create
    env:
      JOB_VAR: "job scope"
    steps:
      - name: list directory
        run: ls -la
      - name: test if file testfile.lck exists
        run: test -f testfile.lck
