name: Post Process (Workflow Run expl.)

on:
  workflow_run:
    workflows: ["workflow event example"]
    types:
      - completed

jobs:
  post:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Post-run step
        run: echo "Downstream workflow triggered after successful CI run"
