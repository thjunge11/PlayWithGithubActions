name: jobs history with artifacts

on:
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - name: create file testfile.lck
        run: |
          mkdir dist
          touch ./dist/testfile.lck          
      - name: test if file testfile.lck exists
        run: |
          cd dist
          test -f testfile.lck
      - uses: actions/upload-artifact@v4
        with:
          name: myArtifacts
          path: dist/*

  check:
    runs-on: ubuntu-latest
    needs: create
    env:
      JOB_VAR: "job scope"
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: myArtifacts
      - name: list directory
        run: |
          cd dist
          ls -la
          test -f testfile.lck
